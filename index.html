<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google tag (gtag.js). Loaded only on the production hostname so dev,
         preview, and staging traffic does not pollute GA4. -->
    <script>
      (function () {
        if (typeof window === 'undefined') return;
        if (window.location.hostname !== 'cornerhouse.co.in') return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-6M5C83YEJB';
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag() { window.dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-6M5C83YEJB');
      })();
    </script>

    <meta name="theme-color" content="#1c1c1c" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta property="og:site_name" content="The Corner House" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Per-route <title>, description, canonical, og:*, twitter:*, and page JSON-LD
         are emitted by the <SEO> component at SSG time. No fallback title needed. -->

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Font preconnect (replaces slower CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Non-blocking font load: preload the CSS, then promote to stylesheet after it lands.
         This removes fonts.googleapis.com from the render-blocking critical path.
         Adds Sacramento, Tangerine, Playfair Display alongside the existing trio. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Sacramento&family=Tangerine:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Caveat:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Sacramento&family=Tangerine:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Caveat:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Preconnect to Unsplash (image CDN, used for below-the-fold imagery) -->
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Preconnect to R2 (hero animated WebP) -->
    <link rel="preconnect" href="https://pub-82d76e9f6b704c56b2da92d2d7335ba8.r2.dev" />

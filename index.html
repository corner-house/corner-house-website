<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c1c1c" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta property="og:site_name" content="The Corner House" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Per-route <title>, description, canonical, og:*, twitter:*, and page JSON-LD
         are emitted by the <SEO> component at SSG time. No fallback title needed. -->

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Font preconnect (replaces slower CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Non-blocking font load: preload the CSS, then promote to stylesheet after it lands.
         This removes fonts.googleapis.com from the render-blocking critical path. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Preconnect to Unsplash (image CDN) -->
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Preconnect to the R2 image host. The hero image preload itself is
         emitted by React 19 automatically from Hero.tsx's fetchPriority="high"
         <img>, so we don't duplicate it here (it was also being wastefully
         preloaded on non-Home routes that never use the image). -->
    <link rel="preconnect" href="https://pub-82d76e9f6b704c56b2da92d2d7335ba8.r2.dev" />

    <!-- Global Organization structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "The Corner House",
        "alternateName": "The Corner House Realty",
        "url": "https://cornerhouse.co.in/",
        "logo": "https://cornerhouse.co.in/favicon.svg",
        "image": "https://cornerhouse.co.in/og-default.jpg",
        "description": "Boutique luxury real estate brokerage specialising in ultra-premium residences across Gurugram and Delhi NCR.",
        "telephone": "+91-98719-50051",
        "email": "hello@cornerhouse.co.in",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "The Corner House, C3-151, Sobha Sector 108",
          "addressLocality": "Gurugram",
          "addressRegion": "Haryana",
          "addressCountry": "IN"
        },
        "areaServed": [
          { "@type": "Place", "name": "Gurugram" },
          { "@type": "Place", "name": "Delhi NCR" },
          { "@type": "Place", "name": "Golf Course Road" },
          { "@type": "Place", "name": "DLF Phase 5" },
          { "@type": "Place", "name": "Aerocity" },
          { "@type": "Place", "name": "Chattarpur" }
        ],
        "sameAs": ["https://www.instagram.com/thecornerhouserealty/"]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
